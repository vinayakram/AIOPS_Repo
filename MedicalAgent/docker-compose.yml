services:
  medical-rag-pod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-rag-pod
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      AIOPS_SERVER_URL: "http://host.docker.internal:7000"
      POD_CPU_THRESHOLD_ENABLED: "true"
      POD_CPU_THRESHOLD_PERCENT: "90"
      POD_MEMORY_THRESHOLD_ENABLED: "true"
      POD_MEMORY_THRESHOLD_PERCENT: "90"
      POD_THRESHOLD_TELEMETRY_MIN_INTERVAL_SECONDS: "1"
    cpus: "0.50"
    mem_limit: "1g"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  triage-agent:
    build:
      context: ./dependent_agent
      dockerfile: Dockerfile
    container_name: triage-agent
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      DEPENDENT_AGENT_NAME: "triage-agent"
      UPSTREAM_SERVICE_NAME: "sample-agent"
      SAMPLE_AGENT_URL: "http://medical-rag-pod:8002"
      AIOPS_SERVER_URL: "http://host.docker.internal:7000"
      AIOPS_ENABLED: "true"
      UPSTREAM_TIMEOUT_SECONDS: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - medical-rag-pod
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: sample-agent-cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/snap/docker/common/var-lib-docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: sample-agent-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - medical-rag-pod
      - triage-agent
      - cadvisor
    restart: unless-stopped
