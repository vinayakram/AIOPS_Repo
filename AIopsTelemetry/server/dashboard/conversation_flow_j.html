<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>助手 | AIOps Assistant</title>
<style>
:root{--bg:#f4f6f9;--rail:#fbfcfe;--hover:#eef4ff;--border:#cfd8e6;--border2:#e8edf4;--text:#0f1728;--muted:#52627a;--soft:#f8fafc;--soft2:#fbfcfe;--ink:#0b0b0d;--red:#d92d20;--red-bg:#fff5f4;--amber:#b54708;--amber-bg:#fffbf4;--blue:#155eef;--blue-bg:#eef4ff;--blue-line:#b8ccff;--green:#067647;--green-bg:#f6fef9;--purple:#6941c6;--purple-bg:#f4f3ff}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",system-ui,sans-serif;font-size:15px;line-height:1.6}
button,input,select{font:inherit}button{font-weight:750}.app{height:100vh;display:grid;grid-template-columns:310px minmax(0,1fr)}.rail{background:var(--rail);border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;box-shadow:1px 0 0 rgba(16,24,40,.02)}.rail-top{height:64px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}.mark{width:36px;height:36px;border:1px solid var(--border);border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:900}.icon-btn{width:38px;height:38px;border:1px solid transparent;background:transparent;border-radius:10px;cursor:pointer;color:var(--muted);font-size:20px}.icon-btn:hover{background:var(--hover);color:var(--blue);border-color:var(--blue-line)}
.rail-actions{padding:0 12px 14px;display:grid;gap:8px}.rail-btn{height:42px;border:1px solid transparent;background:transparent;border-radius:10px;padding:0 12px;display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;color:var(--text)}.rail-btn:hover,.rail-btn.active{background:var(--blue-bg);border-color:var(--blue-line);color:var(--blue)}.rail-section{padding:16px 16px 8px;color:var(--muted);font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}.ticket-list{padding:0 10px 16px;overflow:auto;display:grid;gap:8px}.ticket{border:1px solid transparent;background:transparent;border-radius:11px;padding:11px 12px;text-align:left;cursor:pointer;color:var(--text)}.ticket:hover,.ticket.selected{background:var(--blue-bg);border-color:var(--blue-line)}.ticket-title{font-size:14px;font-weight:800;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ticket-meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:6px}.dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}.dot.critical{background:var(--red)}.dot.high{background:var(--amber)}.dot.medium{background:var(--blue)}
.main{min-width:0;height:100vh;display:flex;flex-direction:column}.topbar{height:64px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;backdrop-filter:saturate(160%) blur(8px)}.brand{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:850}.brand small{font-size:13px;color:var(--muted);font-weight:600}.text-btn{height:38px;border:1px solid var(--border);background:#fff;color:var(--muted);border-radius:9px;padding:0 14px;cursor:pointer}.text-btn:hover{background:var(--blue-bg);border-color:var(--blue-line);color:var(--blue)}
.content{flex:1;overflow:auto;padding:0 24px 18px}.center{max-width:980px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}.welcome{margin:auto 0 28px;text-align:center}.welcome h1{font-size:32px;line-height:1.25;font-weight:850;letter-spacing:0;margin-bottom:18px}.composer-shell{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(244,246,249,0),var(--bg) 20%);padding:18px 0 16px}.composer{max-width:780px;margin:0 auto;min-height:58px;border:1px solid var(--blue-line);border-radius:18px;background:#fff;box-shadow:0 12px 32px rgba(21,94,239,.10);display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:8px 10px}.composer input{border:0;outline:0;font-size:16px;padding:0 8px;min-width:0;color:var(--text)}.composer input::placeholder{color:#7b8798}.send{width:38px;height:38px;border:0;border-radius:10px;background:var(--blue);color:#fff;cursor:pointer;font-weight:900;box-shadow:0 1px 2px rgba(21,94,239,.18)}.send:hover{background:#004eeb}.quick{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:14px auto 0;max-width:780px}.quick button,.chip{height:38px;border:1px solid var(--border);background:#fff;border-radius:999px;padding:0 15px;color:var(--muted);cursor:pointer}.quick button:hover,.chip:hover{background:var(--blue-bg);border-color:var(--blue-line);color:var(--blue)}
.chat{display:flex;flex-direction:column;gap:18px;padding:18px 0 8px}.msg{display:grid;grid-template-columns:36px minmax(0,1fr);gap:12px;max-width:900px}.msg.user{align-self:flex-end;display:block;max-width:min(680px,86%)}.bubble{background:#fff;border:1px solid var(--border2);border-radius:16px;padding:12px 16px;white-space:pre-wrap;box-shadow:0 1px 2px rgba(16,24,40,.04)}.msg.user .bubble{background:var(--blue);border-color:var(--blue);color:#fff}.msg.agent .bubble{background:transparent;border:0;box-shadow:none;padding:0;white-space:normal}.avatar{width:34px;height:34px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:900}.msg h3{font-size:18px;line-height:1.35;margin:0 0 8px;font-weight:850}.muted{color:var(--muted);font-size:13px}.cards{display:grid;gap:10px;margin-top:10px}.chat-card{border:1px solid var(--border);border-radius:12px;background:#fff;padding:16px;box-shadow:0 1px 2px rgba(16,24,40,.04)}.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.card-title{font-weight:850;line-height:1.45}.card-meta{color:var(--muted);font-size:13px;margin-top:3px}.card-desc{margin-top:9px;color:#344054;line-height:1.65}.pills{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:12px;color:var(--muted);background:#fff;white-space:nowrap;font-weight:750}.pill.danger{background:var(--red-bg);color:var(--red);border-color:#f4b8b2}.pill.warn{background:var(--amber-bg);color:var(--amber);border-color:#f7d5a8}.pill.ok{background:var(--green-bg);color:var(--green);border-color:#abefc6}.pill.mcp{background:var(--purple-bg);color:var(--purple);border-color:#d9d6fe}.evidence-grid{display:grid;gap:8px;margin-top:10px}.evidence-item{border:1px solid var(--border2);border-radius:10px;background:var(--soft2);padding:11px 12px}.evidence-item strong{font-size:13px}.evidence-item code{font-size:12px;color:#344054}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.primary{height:38px;border:0;border-radius:999px;background:var(--blue);color:#fff;padding:0 16px;cursor:pointer;box-shadow:0 1px 2px rgba(21,94,239,.18)}.primary:hover{background:#004eeb}.secondary{height:38px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--muted);padding:0 15px;cursor:pointer}.secondary:hover{background:var(--blue-bg);border-color:var(--blue-line);color:var(--blue)}.form-grid{display:grid;grid-template-columns:150px minmax(0,1fr);gap:10px 12px;margin-top:12px;align-items:center}.form-grid label{color:var(--muted);font-size:13px;font-weight:700}.form-grid input,.form-grid select{width:100%;height:40px;border:1px solid var(--border);border-radius:9px;background:#fff;padding:0 10px;min-width:0}.memory{margin-top:10px;border:1px solid var(--blue-line);background:var(--blue-bg);border-radius:12px;padding:11px 12px;color:#1e3a8a}.spinner{display:inline-block;width:10px;height:10px;border:2px solid #c7d7fe;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}.plan{display:grid;gap:10px;margin-top:10px}.plan-section{border:1px solid var(--border);border-radius:12px;padding:13px 14px;background:#fff}.plan-section:nth-child(1){background:#fffbf4}.plan-section:nth-child(2){background:#eef4ff}.plan-section:nth-child(3){background:#f6fef9}.plan-section h4{font-size:14px;margin-bottom:6px}.plan-section ul{padding-left:18px}.rca-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:10px;border:1px solid var(--border);border-radius:12px;overflow:hidden}.rca-table th,.rca-table td{padding:12px 14px;text-align:left;vertical-align:top;border-bottom:1px solid var(--border)}.rca-table th{width:150px;background:var(--soft);color:var(--muted);font-weight:800}.rca-table tr:last-child th,.rca-table tr:last-child td{border-bottom:0}.rca-table .cause{background:#fffbf4}.rca-table .evidence{background:#eef4ff}.rca-table .action{background:#f6fef9}.rca-table ul{margin:0;padding-left:18px}.flow{display:grid;gap:10px;margin-top:10px}.step{border:1px solid var(--border2);border-radius:10px;padding:12px;background:var(--soft2)}.step strong{display:block;margin-bottom:3px}.hidden{display:none!important}.empty{color:var(--muted);font-size:13px;padding:12px}.error{color:var(--red)}
@media(max-width:900px){.app{grid-template-columns:1fr}.rail{display:none}.topbar{padding:0 16px}.content{padding:0 16px 12px}.welcome h1{font-size:28px}.rca-table th{width:112px}.composer-shell{padding-bottom:12px}}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="rail-top"><div class="mark" id="rail-mark">助</div><button class="icon-btn" onclick="newChat()" title="新しい相談">+</button></div>
    <div class="rail-actions">
      <button class="rail-btn active" onclick="newChat()">新しい相談</button>
      <button class="rail-btn" onclick="askOpenTickets()">対応が必要なもの</button>
      <button class="rail-btn" onclick="explainHowToUse()">助手に聞く</button>
    </div>
    <div class="rail-section">最近の問題</div>
    <div id="ticket-list" class="ticket-list"><div class="empty">読み込み中...</div></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="brand"><span id="assistant-name">助手</span> <small id="session-state">AIOps assistant</small></div>
      <button class="text-btn" id="lang-toggle" onclick="toggleLanguage()">English</button>
    </header>
    <section class="content">
      <div class="center">
        <div id="welcome" class="welcome">
          <h1>こんにちは。助手です。</h1>
          <div class="muted" style="margin-top:-10px;margin-bottom:16px">未対応の確認、MCPライブ証拠、原因分析、対応案まで一緒に進めます。</div>
          <div class="quick"><button onclick="askOpenTickets()">未対応を見る</button><button onclick="askRCA()">原因を確認</button><button onclick="askSummary()">やさしく要約</button><button onclick="askRemediation()">対応を進める</button></div>
        </div>
        <div id="chat" class="chat"></div>
        <div class="composer-shell">
          <div class="composer"><button class="icon-btn" onclick="askOpenTickets()" title="未対応を見る">+</button><input id="chat-input" placeholder="例: open tickets / なぜ起きたの？ / 対応を進めたい" onkeydown="handleComposerKey(event)"><button class="send" onclick="sendComposer()">↑</button></div>
        </div>
      </div>
    </section>
  </main>
</div>
<script>
const severityRank={critical:4,high:3,medium:2,low:1};
const sevLabel={critical:'重大',high:'高',medium:'中',low:'低'};
const statusLabel={OPEN:'未対応',ACKNOWLEDGED:'確認中',ESCALATED:'エスカレーション',RESOLVED:'解決済み'};
const statusJa={PROJECT_REVIEW_PENDING:'プロジェクト確認待ち',PROJECT_APPROVED:'対応準備完了',PLAN_DRAFTING:'対応案を作成中',PLAN_RUNNING:'対応案を作成中',PLAN_DRAFTED:'対応案ができました',PLAN_REVISED:'対応案を更新しました',PLAN_REVISION_RUNNING:'対応案を修正中',PLAN_APPROVED:'実装準備完了',IMPLEMENTATION_RUNNING:'実装中',IMPLEMENTATION_READY:'実装確認待ち',REVIEW_PENDING:'レビュー待ち',REVIEW_APPROVED:'レビュー承認済み',PR_CREATING:'PR作成中',PR_CREATED:'PR作成済み',syncing:'準備中',approved:'承認済み'};
const initialParams=new URLSearchParams(location.search);
let currentIssue=null,currentAnalysis=null,currentLang=(initialParams.get('lang')||'ja').startsWith('en')?'en':'ja',ticketsCache=[],remediationStarted=false,chatMemory={project:{}},activeProgressNode=null;
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
async function api(url,opt={}){const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opt});if(!r.ok){let m=await r.text();try{m=JSON.parse(m).detail||m}catch{}throw new Error(m)}return r.json();}
function assistantName(){return currentLang==='ja'?'助手':'AIOPS'}
function assistantMark(){return currentLang==='ja'?'助':'A'}
function setState(t){document.getElementById('session-state').textContent=t}
function hideWelcome(){document.getElementById('welcome').classList.add('hidden')}
function retireOldActions(){document.querySelectorAll('#chat .msg.agent .actions').forEach(el=>el.classList.add('hidden'))}
function addMsg(kind,html){hideWelcome();if(kind==='agent')retireOldActions();const el=document.createElement('div');el.className=`msg ${kind}`;el.innerHTML=kind==='user'?`<div class="bubble">${html}</div>`:`<div class="avatar">${assistantMark()}</div><div class="bubble">${html}</div>`;document.getElementById('chat').appendChild(el);el.scrollIntoView({block:'nearest'});return el.querySelector('.bubble')}
function newChat(){currentIssue=null;currentAnalysis=null;remediationStarted=false;chatMemory={project:{}};document.getElementById('chat').innerHTML='';document.getElementById('welcome').classList.remove('hidden');document.querySelectorAll('.ticket').forEach(el=>el.classList.remove('selected'));setState('待機中')}
function prioritySort(a,b){return(severityRank[b.severity]||0)-(severityRank[a.severity]||0)||new Date(b.created_at||0)-new Date(a.created_at||0)}
async function loadTickets(options={}){const silent=options.silent!==false;setState('確認中');document.getElementById('ticket-list').innerHTML='<div class="empty">読み込み中...</div>';try{const data=await api(`/api/issues?limit=200&lang=${currentLang}`);ticketsCache=(data.issues||[]).filter(i=>i.status!=='RESOLVED').sort(prioritySort);renderSidebarTickets();setState(ticketsCache.length?`${ticketsCache.length}件`:'問題なし');if(!silent)showOpenTickets()}catch(e){document.getElementById('ticket-list').innerHTML=`<div class="empty error">${esc(e.message)}</div>`;if(!silent)addMsg('agent',`問題一覧を取得できませんでした: ${esc(e.message)}`);setState('取得失敗')}}
function renderSidebarTickets(){const list=document.getElementById('ticket-list');if(!ticketsCache.length){list.innerHTML='<div class="empty">未対応の問題はありません。</div>';return}list.innerHTML=ticketsCache.slice(0,12).map(i=>`<button class="ticket" id="ticket-${i.id}" onclick="selectIssue(${i.id},{fromSidebar:true})"><div class="ticket-title">${esc(i.title)}</div><div class="ticket-meta"><span class="dot ${esc(i.severity)}"></span>${esc(sevLabel[i.severity]||i.severity)} · ${esc(i.app_display_name||i.app_name)}</div></button>`).join('')}
function sevPill(i){const cls=i.severity==='critical'?'danger':i.severity==='high'?'warn':'';return `<span class="pill ${cls}">${esc(sevLabel[i.severity]||i.severity)}</span>`}
function statusPill(i){const ok=i.status==='RESOLVED'?'ok':'';return `<span class="pill ${ok}">${esc(statusLabel[i.status]||i.status)}</span>`}
function ticketCard(i){return `<div class="chat-card"><div class="card-head"><div><div class="card-title">${esc(i.title)}</div><div class="card-meta">${esc(i.app_display_name||i.app_name)} · #${i.id}</div></div><div class="pills">${sevPill(i)}${statusPill(i)}</div></div><div class="card-desc">${esc(i.description||'説明はありません')}</div><div class="actions"><button class="primary" onclick="selectIssue(${i.id})">この問題を確認</button><button class="secondary" onclick="selectIssue(${i.id}).then(()=>askRCA())">原因を見る</button><button class="secondary" onclick="selectIssue(${i.id}).then(()=>askRemediation())">対応へ進む</button></div></div>`}
function showOpenTickets(){if(!ticketsCache.length){addMsg('agent','現在、対応が必要な問題はありません。監視は続けています。');return}const shown=ticketsCache.slice(0,6);addMsg('agent',`<h3>未対応の問題</h3><div class="muted">${ticketsCache.length}件あります。優先度が高い順に表示します。</div><div class="cards">${shown.map(ticketCard).join('')}</div>${ticketsCache.length>shown.length?`<div class="muted" style="margin-top:8px">ほかに${ticketsCache.length-shown.length}件あります。「重大な問題を見せて」と入力できます。</div>`:''}`)}
function askOpenTickets(){addMsg('user','未対応の問題を見せて');if(ticketsCache.length)showOpenTickets();else loadTickets({silent:false})}
async function selectIssue(id,opts={}){setState(`#${id}`);document.querySelectorAll('.ticket').forEach(el=>el.classList.remove('selected'));const card=document.getElementById(`ticket-${id}`);if(card)card.classList.add('selected');try{currentIssue=await api(`/api/issues/${id}?lang=${currentLang}`);currentAnalysis=null;remediationStarted=false;chatMemory={project:{}};if(opts.fromSidebar)addMsg('user',`#${id} を確認します。`);addMsg('agent',selectedIssueMessage(currentIssue));setState(`#${id} 選択中`);return currentIssue}catch(e){addMsg('agent',`問題の詳細を取得できませんでした: ${esc(e.message)}`)}}
function selectedIssueMessage(i){return `<h3>この問題を開きました</h3>${ticketCard(i)}<div class="actions"><button class="chip" onclick="askSummary()">短く要約</button><button class="chip" onclick="askRCA()">なぜ起きた？</button><button class="chip" onclick="askRemediation()">対応を進める</button></div>`}
function askSummary(){addMsg('user','やさしく要約して');if(!currentIssue){addMsg('agent','まず確認したい問題を選んでください。「未対応を見る」と入力すると一覧を出します。');return}const i=currentIssue;addMsg('agent',`<h3>短い要約</h3><div class="chat-card"><p>${esc(i.title)}</p><p style="margin-top:8px">${esc(i.description||'説明はありません')}</p><div class="pills" style="margin-top:10px">${sevPill(i)}${statusPill(i)}${i.recurrence_count?`<span class="pill">${i.recurrence_count}回目の類似問題</span>`:''}</div><div class="actions"><button class="primary" onclick="askRCA()">原因を確認</button><button class="secondary" onclick="askRemediation()">対応を進める</button><button class="secondary" onclick="refreshRemediation()">進捗を見る</button></div></div>`)}
async function getRCA(){if(!currentIssue){addMsg('agent','まず問題を選んでください。');return null}try{currentAnalysis=await api(`/api/analysis/issues/${currentIssue.id}?lang=${currentLang}&summary=true`)}catch{addMsg('agent','保存済みRCAがまだ無いので、分析を開始します。完了まで少し待ちます。');await api(`/api/analysis/issues/${currentIssue.id}`,{method:'POST'});currentAnalysis=await pollRCA(currentIssue.id)}return currentAnalysis}
async function askRCA(){addMsg('user','なぜ起きたの？');if(!currentIssue){addMsg('agent','まず問題を選んでください。「未対応を見る」と入力すると一覧を出します。');return}const progress=addMsg('agent',`<div class="chat-card"><div class="pills"><span class="pill mcp">MCP Live</span></div><div style="margin-top:8px"><span class="spinner"></span>${assistantName()}がPrometheusとLangfuseの証拠を確認しています。</div></div>`);try{const live=await getLiveMcpRCA();progress.innerHTML=renderMcpRca(live);return}catch(e){progress.innerHTML=`<div class="chat-card"><div class="pills"><span class="pill warn">MCP unavailable</span></div><div style="margin-top:8px">MCPライブ確認に失敗しました: ${esc(e.message)}<br>保存済みRCAに切り替えます。</div></div>`}const a=await getRCA();if(!a)return;addMsg('agent',renderRcaReport(a))}
async function getLiveMcpRCA(){const body={issue_id:currentIssue.id,message:'why did this happen?',service:currentIssue.app_name,lang:currentLang,window_minutes:10};return api('/api/chat/rca/live',{method:'POST',body:JSON.stringify(body)})}
function renderMcpRca(data){const hazardous=(data.evidence||[]).some(e=>['warning','error','critical'].includes(e.severity));const state=data.confidence==='low'&&!hazardous?(currentLang==='ja'?'ライブ障害なし':'No live hazard'):(currentLang==='ja'?'ライブ確認':'Live check');const ev=(data.evidence||[]).map(e=>`<div class="evidence-item"><div class="pills"><span class="pill">${esc(e.source||'source')}</span><span class="pill ${e.severity==='error'?'danger':e.severity==='warning'?'warn':''}">${esc(e.severity||'info')}</span></div><strong>${esc(e.query_name||e.kind||'evidence')}</strong><div class="muted">${esc(e.service||'unknown')} · ${esc(e.timestamp||'')}</div><div style="margin-top:5px">${esc(e.summary||'')}</div>${e.value!=null?`<code>value=${esc(e.value)}</code>`:''}</div>`).join('')||'<div class="muted">証拠は見つかりませんでした。</div>';const kb=(data.knowledge_matches||[]).map(k=>`<div class="evidence-item"><div class="pills"><span class="pill">${esc(k.source||'knowledge')}</span><span class="pill">${esc(k.remediation_type||'')}</span></div><strong>${esc(k.title||'Knowledge match')}</strong><div class="muted">${esc(k.reason||'')}</div><div style="margin-top:5px">${esc(k.recommended_action||'')}</div></div>`).join('');return `<h3>${assistantName()}のMCPライブRCA</h3><div class="chat-card"><div class="pills"><span class="pill mcp">MCP Live</span><span class="pill ${hazardous?'warn':'ok'}">${esc(state)}</span><span class="pill">${esc(data.confidence||'unknown')}</span></div><p style="margin-top:10px">${esc(data.answer||'')}</p><div class="muted" style="margin-top:8px">${esc(data.suggested_next_action||'')}</div><div class="actions"><button class="primary" onclick="askRCA()">${currentLang==='ja'?'MCPで再確認':'Re-check with MCP'}</button><button class="secondary" onclick="askRemediation()">${currentLang==='ja'?'対応へ進む':'Proceed to response'}</button></div></div>${kb?`<h3 style="margin-top:14px">ナレッジベース</h3><div class="evidence-grid">${kb}</div>`:''}<h3 style="margin-top:14px">ライブ証拠</h3><div class="evidence-grid">${ev}</div>`}
function normalizeEvidenceLine(text){return String(text||'').toLowerCase().replace(/^rca results?:\s*/,'').replace(/[^\p{L}\p{N}]+/gu,' ').trim()}
function evidenceItems(text,cause=''){
  const causeNorm=normalizeEvidenceLine(cause);
  const seen=new Set();
  return (text||'').split('\n')
    .map(x=>x.trim().replace(/^[-・•*]\s*/,'').trim())
    .filter(Boolean)
    .filter(x=>{
      const norm=normalizeEvidenceLine(x);
      if(!norm||seen.has(norm)||norm===causeNorm)return false;
      if(causeNorm&&Math.abs(norm.length-causeNorm.length)<20&&(norm.includes(causeNorm)||causeNorm.includes(norm)))return false;
      seen.add(norm);
      return true;
    })
    .slice(0,4);
}
function renderRcaReport(a){const evidence=evidenceItems(a.evidence,a.likely_cause);return `<h3>原因分析レポート</h3><table class="rca-table"><tr><th class="cause">原因候補</th><td>${esc(a.likely_cause||'未取得')}</td></tr><tr><th class="evidence">確認した根拠</th><td>${evidence.length?`<ul>${evidence.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:'保存済みRCAには、原因候補とは別の根拠行がありません。MCPライブ証拠を確認してください。'}</td></tr><tr><th class="action">おすすめ対応</th><td>${esc(a.recommended_action||'未取得')}</td></tr></table><div class="actions"><button class="primary" onclick="askRemediation()">この内容で対応を進める</button><button class="secondary" onclick="askSummary()">もう少し短く説明</button></div>`}

function isBusyRemediation(data,kind){const status=normalizedStatus(data).toUpperCase();const phase=String(data.job_phase||data.summary_phase||'').toLowerCase();if(status==='FAILED'||status==='PR_CREATED'||status==='REVIEW_PENDING'||status==='IMPLEMENTATION_READY')return false;if(kind==='project')return !(data.resolution_status==='approved'||status==='PROJECT_APPROVED');if(kind==='plan')return ['PLAN_RUNNING','PLAN_DRAFTING','PLAN_REVISION_RUNNING','PROJECT_APPROVED'].includes(status)||['starting','preparing'].includes(phase);if(kind==='implementation')return status==='IMPLEMENTATION_RUNNING'||status==='PLAN_APPROVED'||['starting','preparing','running'].includes(phase);if(kind==='pr')return status==='PR_CREATING'||phase==='pushing'||phase==='pr';return ['PLAN_RUNNING','PLAN_DRAFTING','PLAN_REVISION_RUNNING','IMPLEMENTATION_RUNNING','PR_CREATING'].includes(status)||['starting','preparing','running','pushing','pr'].includes(phase)}

async function pollPlan(progress){for(let i=0;i<40;i++){await new Promise(r=>setTimeout(r,3000));try{const data=await api(`/api/remediation/issues/${currentIssue.id}/plan`);const status=data.status||'';const phase=data.job_phase||data.active_job||'';if(isPlanBusy(data)){updateProgress(progress,'対応案を作成しています。',phase||status);continue}finishProgress(progress,'対応案ができました。確認してください。');showPlan(data);return data}catch(e){const msg=String(e.message||'');if(msg.includes('still being generated')||msg.includes('not found')){updateProgress(progress,'対応案を作成しています。','少し時間がかかっています。');continue}updateProgress(progress,'対応案の確認中です。',msg)}}updateProgress(progress,'対応案はまだ作成中です。','少し時間をおいて「対応案を見る」と入力してください。')}
function normalizedStatus(data){return String(data.status||data.resolution_status||'').trim()||String(data.message||'確認中').trim()}
function statusText(status){if(currentLang==='ja')return statusJa[status]||friendlyStatus(status);const en={PROJECT_REVIEW_PENDING:'Target review needed',PROJECT_APPROVED:'Target approved',PLAN_DRAFTING:'Creating response plan',PLAN_RUNNING:'Creating response plan',PLAN_DRAFTED:'Response plan ready',PLAN_REVISED:'Response plan updated',PLAN_APPROVED:'Plan approved',IMPLEMENTATION_RUNNING:'Implementation running',IMPLEMENTATION_READY:'Implementation ready for review',REVIEW_PENDING:'Review pending',REVIEW_APPROVED:'Review approved',PR_CREATING:'Creating pull request',PR_CREATED:'Pull request created',FAILED:'Failed'};return en[status]||friendlyStatus(status)}
function phaseText(phase){if(!phase)return'';const ja={starting:'開始中',preparing:'準備中',running:'実行中',completed:'完了',failed:'失敗',pushing:'PR準備中',pr:'PR作成中',normalizing:'対象情報を整理中',idle:'待機中'};const en={starting:'starting',preparing:'preparing',running:'running',completed:'completed',failed:'failed',pushing:'preparing PR',pr:'creating PR',normalizing:'normalizing target',idle:'idle'};return (currentLang==='ja'?ja:en)[phase]||phase}

function remediationActions(status,data={}){const raw=String(status).toUpperCase();if(['PLAN_RUNNING','PLAN_DRAFTING','PLAN_REVISION_RUNNING'].includes(raw))return '<div class="muted" style="margin-top:12px"><span class="spinner"></span>対応案を作成しています。この会話に完了結果を表示します。</div><div class="actions"><button class="secondary" onclick="refreshRemediation()">進捗を見る</button></div>';if(raw==='PROJECT_REVIEW_PENDING')return '<div class="actions"><button class="primary" onclick="showProjectSelection()">対象とリポジトリを確認</button><button class="secondary" onclick="refreshRemediation()">進捗を見る</button></div>';if(raw==='PROJECT_APPROVED')return '<div class="actions"><button class="primary" onclick="startPlan()">対応案を作成</button><button class="secondary" onclick="refreshRemediation()">進捗を見る</button></div>';if(raw==='PLAN_DRAFTED'||raw==='PLAN_REVISED')return '<div class="actions"><button class="primary" onclick="getPlan()">対応案を確認</button><button class="secondary" onclick="approvePlan()">この案で実装へ進む</button></div>';if(raw==='IMPLEMENTATION_READY'||raw==='REVIEW_PENDING')return '<div class="actions"><button class="primary" onclick="checkImplementationResults()">実装結果を確認</button><button class="secondary" onclick="createPR()">PR作成へ進む</button></div>';if(raw==='IMPLEMENTATION_RUNNING'||raw==='PLAN_APPROVED'||raw.includes('IMPLEMENT'))return '<div class="muted" style="margin-top:12px"><span class="spinner"></span>実装がバックグラウンドで進行中です。ログとフェーズを更新して確認します。</div><div class="actions"><button class="primary" onclick="refreshRemediation()">進捗を更新</button></div>';if(raw==='REVIEW_APPROVED')return '<div class="actions"><button class="primary" onclick="createPR()">PRを作成</button><button class="secondary" onclick="refreshRemediation()">進捗を見る</button></div>';if(raw==='PR_CREATING')return '<div class="muted" style="margin-top:12px"><span class="spinner"></span>PRを作成しています。</div><div class="actions"><button class="primary" onclick="refreshRemediation()">進捗を更新</button></div>';if(raw==='PR_CREATED')return '<div class="actions"><button class="secondary" onclick="refreshRemediation()">進捗を見る</button></div>';if(raw==='FAILED')return '<div class="actions"><button class="secondary" onclick="refreshRemediation()">詳細を再確認</button></div>';return '<div class="actions"><button class="primary" onclick="showProjectSelection()">対象を確認</button><button class="secondary" onclick="startPlan()">対応案を作成</button><button class="secondary" onclick="refreshRemediation()">進捗を見る</button></div>'}

function planText(d){let body=d?.plan_text||d?.plan||d?.content||d?.markdown||d?.summary||'';if(!body&&typeof d==='object'){body=JSON.stringify(d,null,2)}if(typeof body==='string'&&body.trim().startsWith('{')){try{const parsed=JSON.parse(body);body=parsed.plan_text||parsed.plan||parsed.content||parsed.markdown||parsed.summary||body}catch{}}return String(body||'')}

function valueFrom(data,keys){for(const key of keys){if(data&&data[key]!=null&&data[key]!=='')return data[key]}return''}
function arrayFrom(value){if(Array.isArray(value))return value;if(!value)return[];if(typeof value==='string')return value.split('\n').map(x=>x.trim()).filter(Boolean);return[]}
function renderImplementationResults(summary,artifacts){const status=normalizedStatus(summary);const phase=phaseText(summary.job_phase||summary.summary_phase||'');let impl={};try{impl=typeof summary.implementation_result==='string'?JSON.parse(summary.implementation_result):summary.implementation_result||{}}catch{}const change=summary.change_summary||impl.change_summary||{};const changed=arrayFrom(valueFrom(change,['files_changed','changed_files','modified_files','files'])).concat(arrayFrom(valueFrom(summary,['changed_files','files_changed','modified_files','files'])));const tests=arrayFrom(valueFrom(change,['relevant_test_cases','test_results','validation_results'])).concat(arrayFrom(valueFrom(summary,['validation_results','test_results','checks','validation_output'])));const rawLog=valueFrom(summary,['implementation_logs','logs','progress_log','summary_log'])||impl.codex_final_message||'';const logs=arrayFrom(rawLog).slice(-8);const body=valueFrom(change,['human_summary','summary'])||valueFrom(summary,['summary','implementation_summary','result','message','details'])||impl.human_summary||impl.delivery_blocked_reason||'';const pr=summary.pr_url||impl.pr_url;const prLink=pr?`<p style="margin-top:8px"><a href="${esc(pr)}" target="_blank" rel="noreferrer">${currentLang==='ja'?'Pull Requestを開く':'Open pull request'}</a></p>`:'';const artifactItems=(artifacts.artifacts||[]).map(a=>`<li><a href="${esc(a.view_url||a.download_url||'#')}" target="_blank" rel="noreferrer">${esc(a.name||a.path||'artifact')}</a></li>`).join('');const uniqueChanged=[...new Set(changed.filter(Boolean))];return `<h3>${currentLang==='ja'?'実装結果':'Implementation results'}</h3><div class="chat-card"><div class="pills"><span class="pill">${esc(statusText(status))}</span>${phase?`<span class="pill">${esc(phase)}</span>`:''}</div>${body?`<p style="margin-top:10px">${esc(body)}</p>`:''}${prLink}${uniqueChanged.length?`<div class="plan-section" style="margin-top:12px"><h4>${currentLang==='ja'?'変更ファイル':'Changed files'}</h4><ul>${uniqueChanged.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`:''}${tests.length?`<div class="plan-section" style="margin-top:12px"><h4>${currentLang==='ja'?'検証結果':'Validation'}</h4><ul>${tests.slice(0,6).map(x=>`<li>${esc(typeof x==='string'?x:JSON.stringify(x))}</li>`).join('')}</ul></div>`:''}${logs.length?`<div class="flow" style="margin-top:12px">${logs.map(x=>`<div class="step">${esc(x).slice(0,700)}</div>`).join('')}</div>`:''}${artifactItems?`<div class="plan-section" style="margin-top:12px"><h4>${currentLang==='ja'?'成果物':'Artifacts'}</h4><ul>${artifactItems}</ul></div>`:''}<div class="actions"><button class="primary" onclick="createPR()">${currentLang==='ja'?'PR作成へ進む':'Proceed to PR creation'}</button><button class="secondary" onclick="refreshRemediation()">${currentLang==='ja'?'進捗を見る':'See progress'}</button></div></div>`}
function friendlyStatus(text){const raw=String(text||'');const low=raw.toLowerCase();if(low.includes('plan started')||low.includes('response plan'))return '対応案を作成しています。';if(low.includes('project resolution approved'))return '対象確認が完了し、リポジトリ準備を進めています。';return raw}
function explainHowToUse(){addMsg('user','使い方を教えて');addMsg('agent',`${assistantName()}に自然に入力してください。たとえば「open tickets」「重大な問題を見せて」「なぜ起きたの？」「対応を進めたい」で、同じ会話の中で続けて操作できます。「なぜ起きたの？」ではMCP経由でPrometheus/Langfuse証拠をライブ確認します。`)}
function handleComposerKey(e){if(e.key==='Enter'){e.preventDefault();sendComposer()}}
function sendComposer(){const input=document.getElementById('chat-input');const text=input.value.trim();if(!text)return;input.value='';addMsg('user',esc(text));handleIntent(text)}
function handleIntent(text){const low=text.toLowerCase();if(/open|ticket|issue|未対応|一覧|問題/.test(low)||text.includes('チケット')){if(text.includes('重大')||low.includes('critical')){const first=ticketsCache.find(t=>t.severity==='critical')||ticketsCache[0];if(first)selectIssue(first.id);else loadTickets({silent:false});return}if(ticketsCache.length)showOpenTickets();else loadTickets({silent:false});return}if(/why|cause|rca|原因|なぜ|どうして|理由/.test(low)){askRCA();return}if(/summary|要約|簡単|やさしく/.test(low)){askSummary();return}if(/remediate|fix|対応|修復|直す|進め/.test(low)){askRemediation();return}if(/implementation result|check implementation|実装結果/.test(low)){checkImplementationResults();return}if(/plan|案/.test(low)){getPlan();return}if(/status|progress|進捗|状態/.test(low)){refreshRemediation();return}addMsg('agent','できます。未対応の確認、原因分析、対応開始、進捗確認をこの会話の中で進められます。')}
async function toggleLanguage(){currentLang=currentLang==='ja'?'en':'ja';document.getElementById('lang-toggle').textContent=currentLang==='ja'?'English':'日本語';document.getElementById('assistant-name').textContent=assistantName();document.getElementById('rail-mark').textContent=assistantMark();await loadTickets({silent:true});if(currentIssue){currentIssue=await api(`/api/issues/${currentIssue.id}?lang=${currentLang}`);addMsg('agent',`表示言語を${currentLang==='ja'?'日本語':'English'}に切り替えました。現在の問題は #${currentIssue.id} です。`)}}
async function bootFromContext(){
  document.getElementById('lang-toggle').textContent=currentLang==='ja'?'English':'日本語';
  document.getElementById('assistant-name').textContent=assistantName();
  document.getElementById('rail-mark').textContent=assistantMark();
  await loadTickets({silent:true});
  const issueId=Number(initialParams.get('issue_id')||0);
  if(issueId){
    await selectIssue(issueId);
    if(initialParams.get('mode')==='remediation')askRemediation();
  }
}
bootFromContext();
</script>
